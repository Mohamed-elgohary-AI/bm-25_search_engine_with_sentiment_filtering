stages:
  download_datasets:
    cmd: uv run python -m src.dataset
    params:
    - config/data/amzn.yaml:
      - dataset_name
    - config/data/sent140.yaml:
      - dataset_name
    outs:
    - data/raw

  preprocess:
    cmd: uv run python -m src.preprocessor
    deps:
    - data/raw/Reviews.csv
    - data/raw/training.1600000.processed.noemoticon.csv
    - src/preprocessor.py
    outs:
    - data/processed/reviews.parquet
    - data/processed/reviews_train.parquet
    - data/processed/reviews_test.parquet
    

  build_index:
    cmd: uv run python -m src.pipelines.build_index model=bm25
    deps:
    - data/processed/reviews.parquet
    - src/pipelines/build_index.py
    outs:
    - models/bm25_index.pkl
    params:
    - config/model/bm25.yaml:
      - k1
      - b
    metrics:
    - reports/metrics.json

  train_bert:
    cmd: uv run python -m src.modeling.train model=bert
    deps:
    - data/processed/reviews_train.parquet
    - src/modeling/train.py
    params:
    - config/model/bert.yaml:
      - model_name
      - num_labels
      - max_length
      - batch_size
      - epochs
      - learning_rate
      - sample_size
      - train_split
    outs:
    - models/bert-sentiment
  
  evaluate_bert:
    cmd: uv run python -m src.pipelines.evaluate model=bert
    deps:
    - models/bert-sentiment
    - data/processed/reviews_test.parquet
    - src/pipelines/evaluate.py
    params:
    - config/model/bert.yaml:
      - model_name
      - num_labels
      - max_length
      - batch_size
      - epochs
      - learning_rate
      - sample_size
      - train_split
    metrics:
    - reports/bert/metrics_bert.json