schema: '2.0'
stages:
  download_datasets:
    cmd: uv run python -m src.dataset
    params:
      config/data/amzn.yaml:
        dataset_name: snap/amazon-fine-food-reviews
      config/data/sent140.yaml:
        dataset_name: kazanova/sentiment140
    outs:
    - path: data/raw
      hash: md5
      md5: 8644b753637def768f307c49f912aa76.dir
      size: 539708505
      nfiles: 2
  preprocess:
    cmd: uv run python -m src.preprocessor
    deps:
    - path: data/raw/Reviews.csv
      hash: md5
      md5: c3c950ae0be8b0736477c89d052d33fd
      size: 300904694
    - path: data/raw/training.1600000.processed.noemoticon.csv
      hash: md5
      md5: df952449d6f9b5f9fdfe3fc53ddef7ca
      size: 238803811
    outs:
    - path: data/processed/reviews.parquet
      hash: md5
      md5: f1a422627694b3af26486ecc0d9835f2
      size: 3512381
  build_index:
    cmd: uv run python -m src.pipelines.build_index model=bm25
    deps:
    - path: data/processed/reviews.parquet
      hash: md5
      md5: f1a422627694b3af26486ecc0d9835f2
      size: 3512381
    params:
      config/model/bm25.yaml:
        b: 0.75
        k1: 1.5
    outs:
    - path: models/bm25_index.pkl
      hash: md5
      md5: aa820a940b4367a917624dff5269c564
      size: 4304764
    - path: reports/metrics.json
      hash: md5
      md5: bbf5ec7e824d3269c35afdb3d8278a15
      size: 48
  evaluate:
    cmd: uv run python -m src.pipelines.evaluate
    deps:
    - path: models/bm25_index.pkl
      hash: md5
      md5: aa820a940b4367a917624dff5269c564
      size: 4304764
  train_bert:
    cmd: uv run python -m src.modeling.train model=bert
    deps:
    - path: data/processed/reviews.parquet
      hash: md5
      md5: f1a422627694b3af26486ecc0d9835f2
      size: 3512381
    params:
      config/model/bert.yaml:
        batch_size: 32
        epochs: 1
        learning_rate: 2e-05
        max_length: 128
        model_name: distilbert-base-uncased
        num_labels: 3
        sample_size: 5000
        train_split: 0.8
    outs:
    - path: models/bert-sentiment
      hash: md5
      md5: eea3aabe195f55da57ff0bdbb62f97e5.dir
      size: 268548492
      nfiles: 4
