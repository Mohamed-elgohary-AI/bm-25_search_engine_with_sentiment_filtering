schema: '2.0'
stages:
  download_datasets:
    cmd: uv run python -m src.dataset
    params:
      config/data/amzn.yaml:
        dataset_name: snap/amazon-fine-food-reviews
      config/data/sent140.yaml:
        dataset_name: kazanova/sentiment140
    outs:
    - path: data/raw
      hash: md5
      md5: 8644b753637def768f307c49f912aa76.dir
      size: 539708505
      nfiles: 2
  preprocess:
    cmd: uv run python -m src.preprocessor
    deps:
    - path: data/raw/Reviews.csv
      hash: md5
      md5: c3c950ae0be8b0736477c89d052d33fd
      size: 300904694
    - path: data/raw/training.1600000.processed.noemoticon.csv
      hash: md5
      md5: df952449d6f9b5f9fdfe3fc53ddef7ca
      size: 238803811
    outs:
    - path: data/processed/reviews.parquet
      hash: md5
      md5: 210f285be2fb5af393ef1cd2c511dd4c
      size: 288899090
    - path: data/processed/reviews_test.parquet
      hash: md5
      md5: bb32a1ef86bfe9f4adcf936058040710
      size: 61091673
    - path: data/processed/reviews_train.parquet
      hash: md5
      md5: 4dece810e15cbf3bea882aa9d6809036
      size: 243362685
  build_index:
    cmd: uv run python -m src.pipelines.build_index model=bm25
    deps:
    - path: data/processed/reviews.parquet
      hash: md5
      md5: 210f285be2fb5af393ef1cd2c511dd4c
      size: 288899090
    params:
      config/model/bm25.yaml:
        b: 0.75
        k1: 1.5
    outs:
    - path: models/bm25_index.pkl
      hash: md5
      md5: c9517850f6adf6ab590cd1af8dc0da71
      size: 344563916
    - path: reports/metrics.json
      hash: md5
      md5: e37118c119d9e846482996192e1780ee
      size: 61
  evaluate:
    cmd: uv run python -m src.pipelines.evaluate
    deps:
    - path: models/bm25_index.pkl
      hash: md5
      md5: c9517850f6adf6ab590cd1af8dc0da71
      size: 344563916
  train_bert:
    cmd: uv run python -m src.modeling.train model=bert
    deps:
    - path: data/processed/reviews.parquet
      hash: md5
      md5: 210f285be2fb5af393ef1cd2c511dd4c
      size: 288899090
    params:
      config/model/bert.yaml:
        batch_size: 32
        epochs: 1
        learning_rate: 2e-05
        max_length: 256
        model_name: google/bert_uncased_L-2_H-128_A-2
        num_labels: 3
        sample_size: 50000
        train_split: 0.8
    outs:
    - path: models/bert-sentiment
      hash: md5
      md5: a2d0fc481ea1055f3612e9ab189f2b2f.dir
      size: 18262800
      nfiles: 4
